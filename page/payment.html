<div class="payment-section">
    <h2 class="title-payment">Metode Pembayaran</h2>

    <div class="payment-category-title">QRIS & E-Wallet</div>
    <div class="payment-methods-grid">
        <div class="payment-method-item" data-method="qris">
            <img src="assets/IMG_1399.png" alt="QRIS" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=QRIS'">
        </div>
        <div class="payment-method-item" data-method="dana">
            <img src="assets/IMG_1400.png" alt="DANA" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=DANA'">
        </div>
        <div class="payment-method-item" data-method="linkaja">
            <img src="assets/IMG_1401.png" alt="LinkAja" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=LinkAja'">
        </div>
    </div>

    <div class="payment-category-title">Gerai Offline</div>
    <div class="payment-methods-grid">
        <div class="payment-method-item" data-method="alfamart">
            <img src="https://buylink.s3.ap-southeast-3.amazonaws.com/default/logo-payment/alfamart.svg" alt="Alfamart" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=Alfamart'">
        </div>
        <div class="payment-method-item" data-method="indomaret">
            <img src="https://buylink.s3.ap-southeast-3.amazonaws.com/default/logo-payment/indomaret.svg" alt="Indomaret" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=Indomaret'">
        </div>
    </div>

    <div class="payment-category-title">Virtual Account</div>
    <div class="payment-methods-grid">
        <div class="payment-method-item" data-method="briva">
            <img src="https://buylink.s3.ap-southeast-3.amazonaws.com/default/logo-payment/briva.svg" alt="BRIVA (BRI)" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=BRIVA'">
        </div>
        <div class="payment-method-item" data-method="va-mandiri">
            <img src="https://buylink.s3.ap-southeast-3.amazonaws.com/default/logo-payment/mandiri.svg" alt="VA Mandiri" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=Mandiri'">
        </div>
        <div class="payment-method-item" data-method="va-bni">
            <img src="https://buylink.s3.ap-southeast-3.amazonaws.com/default/logo-payment/bni.svg" alt="VA BNI" onerror="this.onerror=null;this.src='https://placehold.co/70x70/aabbcc/ffffff?text=BNI'">
        </div>
    </div>

    <div id="selected-method-info" class="selected-method-info">
        <p>Pilih metode pembayaran di atas untuk melihat instruksi.</p>
    </div>
</div>

<script>
    $(document).ready(function() {
        const paymentDetails = {
            qris: "Scan kode QR menggunakan aplikasi e-wallet Anda (DANA, OVO, GoPay, dll).",
            dana: "Lakukan pembayaran melalui aplikasi DANA Anda ke nomor Admin.",
            linkaja: "Lakukan pembayaran melalui aplikasi LinkAja Anda.",
            alfamart: "Sampaikan ke kasir pembayaran via Buylink/Saldoin.",
            indomaret: "Sampaikan ke kasir pembayaran via Buylink/Saldoin.",
            briva: "Gunakan Virtual Account BRI untuk transaksi otomatis.",
            "va-mandiri": "Gunakan Virtual Account Mandiri untuk transaksi otomatis.",
            "va-bni": "Gunakan Virtual Account BNI untuk transaksi otomatis."
        };

        $(".payment-method-item").on("click", function() {
            $(".payment-method-item").removeClass("active");
            $(this).addClass("active");
            const method = $(this).data("method");
            $("#selected-method-info").html(\`
                <h3 style='color: var(--accent); margin-bottom: 12px;'>\${method.toUpperCase()}</h3>
                <p>\${paymentDetails[method]}</p>
                <div class='btn btn-primary mt-4' style='width: 100%'>Lanjut Pembayaran</div>
            \`);
        });
    });
</script>
